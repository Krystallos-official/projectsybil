version: "3.9"

services:

  neo4j:
    image: neo4j:5.18-enterprise
    container_name: sybil-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["graph-data-science","apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*,apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2G"
      NEO4J_dbms_memory_pagecache_size: "512m"
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/init:/var/lib/neo4j/import
      - ./neo4j/plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - sybil

  ingestion:
    build:
      context: ./packages/ingestion
      dockerfile: Dockerfile
    container_name: sybil-ingestion
    ports:
      - "3001:3001"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_ORG=${GITHUB_ORG}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - JIRA_HOST=${JIRA_HOST}
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_TOKEN=${JIRA_TOKEN}
      - NOTION_TOKEN=${NOTION_TOKEN}
      - ANALYSIS_SERVICE_URL=http://analysis:8000
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3001
    volumes:
      - ./packages/ingestion/src:/app/src
    networks:
      - sybil

  analysis:
    build:
      context: ./packages/analysis
      dockerfile: Dockerfile
    container_name: sybil-analysis
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    volumes:
      - analysis_output:/app/output
    networks:
      - sybil

  dashboard:
    build:
      context: ./packages/dashboard
      dockerfile: Dockerfile
    container_name: sybil-dashboard
    ports:
      - "3000:3000"
    depends_on:
      - ingestion
    environment:
      - VITE_API_URL=http://localhost:3001
    networks:
      - sybil

volumes:
  neo4j_data:
  neo4j_logs:
  analysis_output:

networks:
  sybil:
    driver: bridge
