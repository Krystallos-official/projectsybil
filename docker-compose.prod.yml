version: "3.9"

# Production overrides — use with:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  neo4j:
    restart: always
    environment:
      NEO4J_dbms_memory_heap_initial__size: "2G"
      NEO4J_dbms_memory_heap_max__size: "4G"
      NEO4J_dbms_memory_pagecache_size: "2G"
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4"

  ingestion:
    restart: always
    environment:
      - NODE_ENV=production
    volumes: []  # No source mounting in prod
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"

  analysis:
    restart: always
    volumes: []
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4"

  dashboard:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
